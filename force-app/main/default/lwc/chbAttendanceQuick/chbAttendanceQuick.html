<template>
    <lightning-card title="Attendance Quick" icon-name="standard:task">
        <div class=" slds-p-around_medium">
            <lightning-input type="text" label="Documento de identidad" value={CC} onchange={handleCedulaChange}></lightning-input>
            <lightning-button variant="brand" label="Buscar Alumno" onclick={handleSearch}></lightning-button>

            <template if:true={alumno}>
                <c-chb-alumno-attendance-card alumno={alumno}></c-chb-alumno-attendance-card>
            </template>
            
            <p class="slds-m-top_small slds-text-color_weak">{msg}</p>
            <p class="slds-text-color_weak slds-m-top_small">(initial version)</p>
        </div>
    </lightning-card>
</template>
